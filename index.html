<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Family Cleaning Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              foreground: {
                100: "#fffbf8", 150: "#f8f4f1", 200: "#efeae7", 250: "#e2ddd9",
                300: "#cfc9c5", 350: "#b3ada8", 400: "#98918b", 450: "#746d68",
                550: "#635c57", 600: "#5a544f", 650: "#4c4642", 700: "#3f3935",
                750: "#322d29", 800: "#272320", 850: "#1d1a17", 900: "#14110e",
              },
              background: {
                100: "#fffbf8", 150: "#f8f4f1", 200: "#efeae7", 250: "#e2ddd9",
                300: "#cfc9c5", 350: "#b3ada8", 400: "#98918b", 450: "#746d68",
              },
              accent: {
                100: "#f5f8fd", 150: "#eef4fe", 200: "#dbeafe", 250: "#c4dbfa",
                300: "#93b5ef", 350: "#6e9be4", 400: "#5489d6", 450: "#3468b0",
                550: "#2b5899", 600: "#244b83", 650: "#1e3f6e", 700: "#1a355e",
                750: "#152b4e", 800: "#102140", 850: "#0c1832", 900: "#081025",
              },
              stroke: {
                100: "#fffbf8", 150: "#fff3ea", 200: "#f6e8dd", 250: "#ebdbce",
                300: "#dac6b7", 350: "#c1a996", 400: "#a88c76", 450: "#87674e",
              },
              muted: {
                100: "#fffbf8", 150: "#fff3ea", 200: "#f6e8dd", 250: "#ebdbce",
                300: "#dac6b7", 350: "#c1a996", 400: "#a88c76", 450: "#87674e",
              },
              dad: { light: "#EFF6FF", mid: "#BFDBFE", base: "#3B82F6", dark: "#1E40AF", text: "#1E3A5F" },
              micah: { light: "#ECFDF5", mid: "#A7F3D0", base: "#10B981", dark: "#065F46", text: "#064E3B" },
              evan: { light: "#FFFBEB", mid: "#FDE68A", base: "#F59E0B", dark: "#92400E", text: "#78350F" },
            },
            fontFamily: {
              display: ["Nunito", "sans-serif"],
              sans: ["Inter", "sans-serif"],
            },
            borderRadius: {
              "3xl": "1.25rem", "4xl": "1.5rem",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --dad: #3B82F6;
        --micah: #10B981;
        --evan: #F59E0B;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: #f8f4f1;
        min-height: 100vh;
      }
      .tab-active-dad { border-color: var(--dad); color: var(--dad); background: #EFF6FF; }
      .tab-active-micah { border-color: var(--micah); color: var(--micah); background: #ECFDF5; }
      .tab-active-evan { border-color: var(--evan); color: var(--evan); background: #FFFBEB; }

      .task-checked { text-decoration: line-through; opacity: 0.55; }

      .checkbox-custom {
        width: 22px; height: 22px; border-radius: 6px;
        border: 2px solid #cfc9c5; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.25s cubic-bezier(.4,0,.2,1);
        flex-shrink: 0;
      }
      .checkbox-custom:hover { border-color: #98918b; }
      .checkbox-custom.checked-dad { background: var(--dad); border-color: var(--dad); }
      .checkbox-custom.checked-micah { background: var(--micah); border-color: var(--micah); }
      .checkbox-custom.checked-evan { background: var(--evan); border-color: var(--evan); }
      .checkbox-custom svg { display: none; }
      .checkbox-custom[data-checked="true"] svg { display: block; }

      .progress-bar-inner { transition: width 0.5s cubic-bezier(.4,0,.2,1); }

      .card-dad { border-top: 4px solid var(--dad); }
      .card-micah { border-top: 4px solid var(--micah); }
      .card-evan { border-top: 4px solid var(--evan); }

      .day-tab {
        transition: all 0.2s ease;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        padding: 8px 16px;
        font-weight: 600;
        color: #746d68;
        border-radius: 12px 12px 0 0;
        user-select: none;
      }
      .day-tab:hover { background: #efeae7; color: #3f3935; }
      .day-tab.active {
        background: #fffbf8;
        color: #3468b0;
        border-bottom-color: #3468b0;
      }
      .day-tab.today-marker {
        position: relative;
      }
      .day-tab.today-marker::after {
        content: '';
        position: absolute;
        top: 4px; right: 4px;
        width: 8px; height: 8px;
        background: #F59E0B;
        border-radius: 50%;
      }

      @keyframes confettiDrop {
        0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
      .confetti-piece {
        position: fixed; top: -20px;
        width: 10px; height: 10px;
        z-index: 100;
        animation: confettiDrop 3s ease-in forwards;
      }

      @keyframes celebrationPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      .celebration-banner {
        animation: celebrationPulse 1.5s ease-in-out infinite;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .slide-down { animation: slideDown 0.35s ease-out; }

      @keyframes taskCheck {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); }
        100% { transform: scale(1); }
      }
      .task-pop { animation: taskCheck 0.3s ease; }

      .house-progress-fill {
        transition: width 0.6s cubic-bezier(.4,0,.2,1);
        background: linear-gradient(90deg, #3B82F6, #10B981, #F59E0B);
      }

      .person-avatar {
        width: 44px; height: 44px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: 700; color: white;
      }

      .age-badge {
        font-size: 12px;
        font-weight: 600;
        color: #98918b;
        margin-left: 2px;
      }

      @media (max-width: 767px) {
        .day-tab { padding: 6px 8px; font-size: 13px; }
        .person-cards-grid { flex-direction: column !important; }
      }
    </style>
</head>
<body data-id="0" class="bg-background-150">
    <app-icon data-id="1" hidden data-icon="sparkles" data-palette="Blue"></app-icon>

    <!-- Header -->
    <header data-id="2" class="bg-background-100 shadow-sm sticky top-0 z-50">
      <div data-id="3" class="max-w-7xl mx-auto px-4 md:px-6 py-4">

            <p data-id="8" id="header-date" class="text-sm text-foreground-450 mt-0.5 font-medium"></p>
          </div>
          <div data-id="9" id="today-badge" class="hidden sm:flex items-center gap-2 bg-accent-200 text-accent-600 px-4 py-2 rounded-xl font-display font-bold text-sm">

        <div data-id="12" class="mt-4 flex gap-1 overflow-x-auto pb-0 -mb-px" id="day-tabs">

    <main data-id="20" class="max-w-7xl mx-auto px-4 md:px-6 py-6">
      <!-- House Progress Banner -->
      <div data-id="21" class="bg-background-100 rounded-2xl p-4 md:p-5 mb-6 slide-down" style="box-shadow: 0px 4px 16px rgba(20,17,14,0.05);">
        <div data-id="22" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3">
          <div data-id="23" class="flex items-center gap-2">
            <i data-id="24" data-lucide="home" class="w-5 h-5 text-foreground-600"></i>
            <span data-id="25" class="font-display font-bold text-foreground-800 text-lg">House Progress</span>
          </div>
          <span data-id="26" id="house-progress-text" class="text-sm font-semibold text-foreground-600 tabular-nums"></span>
        </div>
        <div data-id="27" class="w-full bg-background-200 rounded-full h-3.5 overflow-hidden">
          <div data-id="28" id="house-progress-bar" class="house-progress-fill h-full rounded-full" style="width:0%"></div>
        </div>
      </div>

      <!-- Celebration Banner (hidden by default) -->
      <div data-id="29" id="celebration-banner" class="hidden mb-6 celebration-banner bg-gradient-to-r from-dad-light via-micah-light to-evan-light rounded-2xl p-5 text-center" style="box-shadow: 0px 4px 20px rgba(20,17,14,0.08);">
        <p data-id="30" class="font-display text-2xl md:text-3xl font-extrabold text-foreground-900">🎉 House is clean today!</p>
        <p data-id="31" class="text-foreground-600 font-medium mt-1">Amazing teamwork! Every task is done.</p>
      </div>

      <!-- Person Cards -->
      <div data-id="32" class="person-cards-grid flex flex-col md:flex-row gap-5" id="cards-container">

      </div>

      <!-- Reset Day Button -->
      <div data-id="33" class="mt-8 text-center">
        <button data-id="34" id="reset-day-btn" class="inline-flex items-center gap-2 bg-background-200 hover:bg-background-250 text-foreground-700 font-semibold px-6 py-3 rounded-xl transition-colors text-sm min-h-[44px]">
          <i data-id="35" data-lucide="rotate-ccw" class="w-4 h-4"></i>
          Reset Today's Tasks
        </button>
      </div>
    </main>

    <footer data-id="36" class="py-8 mt-auto text-center">
      <p data-id="37" class="text-xs text-foreground-450">Made by Copilot</p>
    </footer>

    <script>
    (function() {
      // ── Data ──────────────────────────────────────────
      const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const FULL_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

      const PEOPLE = [
        { id: 'charles', name: 'Charles', label: 'Dad', emoji: '👨', colorClass: 'dad', color: '#3B82F6', age: null },
        { id: 'micah', name: 'Micah', label: 'Age 17', emoji: '👦', colorClass: 'micah', color: '#10B981', age: 17 },
        { id: 'evan', name: 'Evan', label: 'Age 12', emoji: '🧒', colorClass: 'evan', color: '#F59E0B', age: 12 },
      ];

      const dailyRecurring = {
        0: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
        1: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
        2: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
        3: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
        4: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
        5: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
        6: { charles: ['🧺 Laundry'], micah: ['🍽️ Dishes'], evan: ['🗑️ Empty Trash', '🌿 Water Plants'] },
      };

      const roomTasks = {
        0: {
          title: 'First Floor: Office & Living Room',
          charles: [{ icon: '🖥️', room: 'Office', tasks: 'Dust surfaces, vacuum floor, organize desk' }],
          micah: [{ icon: '🛋️', room: 'Living Room', tasks: 'Vacuum carpet/floors, dust furniture, straighten cushions & throws' }],
          evan: [
            { icon: '🚿', room: 'First Floor Bathroom', tasks: 'Wipe sink & toilet exterior, replace hand towels, restock soap' },
            { icon: '♻️', room: 'Bring Trash Can Back', tasks: 'Return the trash can to the back yard' }
          ],
        },
        1: {
          title: 'Kitchen & Hallway',
          charles: [{ icon: '🍳', room: 'Kitchen', tasks: 'Wipe counters & stovetop, clean appliances, mop floor' }],
          micah: [{ icon: '🧹', room: 'Vacuum stairs, hallway & entryway', tasks: 'Full vacuum of all steps & landing' }],
          evan: [],
        },
        2: {
          title: "Kids' Bedrooms",
          charles: [{ icon: '🧼', room: 'Hallway Touch-Up', tasks: 'Quick straighten-up, spot clean surfaces, and tidy shared areas' }],
          micah: [{ icon: '🛏️', room: "Micah's Bedroom", tasks: 'Full clean: vacuum, dust all surfaces, organize & make bed' }],
          evan: [{ icon: '🛏️', room: "Evan's Bedroom", tasks: 'Tidy up, put away clothes, make bed, wipe surfaces' }],
        },
        3: {
          title: 'Second Floor Common Areas',
          charles: [{ icon: '👑', room: 'Master Bedroom', tasks: 'Dust, vacuum, make bed, organize surfaces' }],
          micah: [{ icon: '🚿', room: "Kids' Bathroom", tasks: 'Scrub toilet & sink, wipe mirror, sweep & mop floor' }],
          evan: [{ icon: '🎮', room: 'Entertainment Room', tasks: 'Dust surfaces, straighten items & remotes, tidy shelves' }],
        },
        4: {
          title: 'Master Bath & Touch-Ups',
          charles: [
            { icon: '🛁', room: 'Master Bathroom', tasks: 'Scrub toilet, sink & shower/tub, mop floor' },
            { icon: '🛏️', room: 'Bed Sheets', tasks: 'Wash and change the master bed sheets (weekly)' }
          ],
          micah: [{ icon: '🌬️', room: 'Second Floor Dusting', tasks: 'Dust all surfaces, windowsills & baseboards' }],
          evan: [{ icon: '🛋️', room: 'Living Room Touch-Up', tasks: 'Quick tidy, fluff cushions, wipe coffee table' }],
        },
        5: {
          title: 'Deep Kitchen & Full Vacuuming',
          charles: [
            { icon: '🍳', room: 'Kitchen Deep Clean', tasks: 'Clean oven & microwave, wipe inside fridge, organize pantry' },
            { icon: '🌿', room: 'Yard Trimming', tasks: 'Trim edges and overgrowth in the yard' }
          ],
          micah: [
            { icon: '🧹', room: 'Vacuum Entire First Floor', tasks: 'All rooms, hallway & entryway' },
            { icon: '🚜', room: 'Mow Grass', tasks: 'Mow the yard grass' },
          ],
          evan: [
            { icon: '🧹', room: 'Vacuum Entire Second Floor', tasks: 'All bedrooms, bathrooms & entertainment room' },
            { icon: '🍃', room: 'Blow Patio & Driveway', tasks: 'Blow grass and dirt off patio and driveway' }
          ],
        },
        6: {
          title: 'Light Reset & Prep for Week',
          charles: [{ icon: '🖥️', room: 'Office Reset', tasks: 'Tidy desk, restock supplies, check cleaning inventory' }],
          micah: [{ icon: '🚿', room: "Kids' Bathroom Touch-Up", tasks: 'Wipe counters & mirror, restock soap & toilet paper' }],
          evan: [
            { icon: '🎮', room: 'Entertainment Room Reset', tasks: 'Tidy remotes, straighten furniture, quick dust' },
            { icon: '🚮', room: 'Put Trash Out', tasks: 'Roll the trash can out for pickup' }
          ],
        },
        6: {
          title: 'Light Reset & Prep for Week',
          charles: [{ icon: '🖥️', room: 'Office Reset', tasks: 'Tidy desk, restock supplies, check cleaning inventory' }],
          micah: [{ icon: '🚿', room: "Kids' Bathroom Touch-Up", tasks: 'Wipe counters & mirror, restock soap & toilet paper' }],
          evan: [
            { icon: '🎮', room: 'Entertainment Room Reset', tasks: 'Tidy remotes, straighten furniture, quick dust' },
            { icon: '🛏️', room: 'Bed Sheets', tasks: 'Wash and change Micah\'s bed sheets (weekly)' },
            { icon: '🚮', room: 'Put Trash Out', tasks: 'Roll the trash can out for pickup' }
          ],
        },
      };

      // ── State ──────────────────────────────────────────
      let currentDay = 0;
      let todayIndex = 0;

      function getTodayIndex() {
        const jsDay = new Date().getDay(); // 0=Sunday
        return jsDay === 0 ? 6 : jsDay - 1; // Mon=0 ... Sun=6
      }

      function getStorageKey(dayIdx) {
        return 'familyCleaning_day_' + dayIdx;
      }

      function loadChecked(dayIdx) {
        try {
          const raw = localStorage.getItem(getStorageKey(dayIdx));
          return raw ? JSON.parse(raw) : {};
        } catch(e) { return {}; }
      }

      function saveChecked(dayIdx, checkedMap) {
        localStorage.setItem(getStorageKey(dayIdx), JSON.stringify(checkedMap));
      }

      function resetDay(dayIdx) {
        localStorage.removeItem(getStorageKey(dayIdx));
        renderDay(dayIdx);
      }

      // ── Build task list for a person on a day ──────────
      function getTasksForPerson(dayIdx, personId) {
        const tasks = [];
        // Daily recurring task
        const daily = dailyRecurring[dayIdx][personId];
        if (daily) {
          daily.forEach((dailyTask, index) => {
            tasks.push({ id: personId + '_daily_' + index, text: dailyTask, type: 'daily' });
          });
        }
        // Room tasks
        const rooms = roomTasks[dayIdx][personId];
        if (rooms) {
          rooms.forEach((r, i) => {
            tasks.push({
              id: personId + '_room_' + i,
              text: r.icon + ' ' + r.room,
              detail: r.tasks,
              type: 'room'
            });
          });
        }
        return tasks;
      }

      // ── Render ─────────────────────────────────────────
      function renderDay(dayIdx) {
        currentDay = dayIdx;
        const checkedMap = loadChecked(dayIdx);

        // Update tabs
        document.querySelectorAll('.day-tab').forEach(tab => {
          const d = parseInt(tab.dataset.day);
          tab.classList.remove('active', 'today-marker');
          if (d === dayIdx) tab.classList.add('active');
          if (d === todayIndex) tab.classList.add('today-marker');
        });

        // Update header subtitle
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('header-date').textContent = dateStr;

        // Today badge
        const badge = document.getElementById('today-badge');
        const badgeText = document.getElementById('today-badge-text');
        if (dayIdx === todayIndex) {
          badge.classList.remove('hidden');
          badge.classList.add('sm:flex');
          badgeText.textContent = "Today's Plan";
        } else {
          badge.classList.add('hidden');
          badge.classList.remove('sm:flex');
        }

        // Day theme title
        const dayTheme = roomTasks[dayIdx].title;

        // Build cards
        const container = document.getElementById('cards-container');
        container.innerHTML = '';

        let totalTasks = 0;
        let totalChecked = 0;

        PEOPLE.forEach(person => {
          const tasks = getTasksForPerson(dayIdx, person.id);
          const personChecked = tasks.filter(t => checkedMap[t.id]).length;
          const personTotal = tasks.length;
          const pct = personTotal > 0 ? Math.round((personChecked / personTotal) * 100) : 0;

          totalTasks += personTotal;
          totalChecked += personChecked;

          const card = document.createElement('div');
          card.className = 'flex-1 min-w-0 bg-background-100 rounded-2xl card-' + person.colorClass + ' slide-down';
          card.style.boxShadow = '0px 6px 20px rgba(20,17,14,0.06)';

          const avatarBg = person.color;
          const progressBg = person.colorClass === 'dad' ? '#BFDBFE' : person.colorClass === 'micah' ? '#A7F3D0' : '#FDE68A';

          const ageBadgeHtml = person.age ? `<span class="age-badge">(${person.age})</span>` : '';

          // Build tasks properly with sections
          const cardInner = document.createElement('div');
          cardInner.innerHTML = `
            <div class="p-5 pb-3">
              <div class="flex items-center gap-3 mb-3">
                <div class="person-avatar" style="background:${avatarBg}">${person.emoji}</div>
                <div class="flex-1 min-w-0">
                  <h3 class="font-display font-bold text-foreground-900 text-lg flex items-center">${person.name}${ageBadgeHtml}</h3>
                  <p class="text-xs font-medium text-foreground-450">${person.label}</p>
                </div>
                <span class="text-xs font-bold tabular-nums px-2.5 py-1 rounded-lg" style="background:${progressBg}; color:${person.color}">${pct}%</span>
              </div>
              <div class="w-full rounded-full h-2 overflow-hidden" style="background:${progressBg}55">
                <div class="progress-bar-inner h-full rounded-full" style="width:${pct}%; background:${person.color}"></div>
              </div>
            </div>
            <div class="px-5 pt-1 pb-1">
              <p class="text-[10px] font-semibold uppercase tracking-widest text-foreground-350 mb-0.5 flex items-center gap-1">
                <i data-lucide="repeat" class="w-3 h-3"></i> Daily Task
              </p>
            </div>
            <div class="px-4">
              ${tasks.filter(t => t.type === 'daily').map(task => {
                const isChecked = !!checkedMap[task.id];
                return buildTaskRow(task, isChecked, person.colorClass);
              }).join('')}
            </div>
            <div class="px-5 pt-3 pb-1">
              <p class="text-[10px] font-semibold uppercase tracking-widest text-foreground-350 mb-0.5 flex items-center gap-1">
                <i data-lucide="door-open" class="w-3 h-3"></i> Room Cleaning
              </p>
            </div>
            <div class="px-4 pb-5">
              ${tasks.filter(t => t.type === 'room').map(task => {
                const isChecked = !!checkedMap[task.id];
                return buildTaskRow(task, isChecked, person.colorClass);
              }).join('')}
            </div>
          `;

          card.innerHTML = cardInner.innerHTML;
          container.appendChild(card);
        });

        // Update house progress
        const housePct = totalTasks > 0 ? Math.round((totalChecked / totalTasks) * 100) : 0;
        document.getElementById('house-progress-text').textContent = totalChecked + ' / ' + totalTasks + ' tasks (' + housePct + '%)';
        document.getElementById('house-progress-bar').style.width = housePct + '%';

        // Celebration
        const celBanner = document.getElementById('celebration-banner');
        if (totalChecked === totalTasks && totalTasks > 0) {
          celBanner.classList.remove('hidden');
          if (!celBanner.dataset.shown) {
            celBanner.dataset.shown = 'true';
            launchConfetti();
          }
        } else {
          celBanner.classList.add('hidden');
          celBanner.dataset.shown = '';
        }

        // Re-init Lucide icons
        if (typeof lucide !== "undefined" && typeof lucide.createIcons === "function") {
          lucide.createIcons();
        }

        // Bind checkboxes
        document.querySelectorAll('.checkbox-custom').forEach(cb => {
          cb.addEventListener('click', function() {
            const taskId = this.dataset.taskId;
            const personColor = this.dataset.person;
            const map = loadChecked(currentDay);
            const nowChecked = !map[taskId];
            if (nowChecked) { map[taskId] = true; } else { delete map[taskId]; }
            saveChecked(currentDay, map);
            this.classList.add('task-pop');
            setTimeout(() => this.classList.remove('task-pop'), 300);
            renderDay(currentDay);
          });
        });

        // Also make the whole row clickable
        document.querySelectorAll('.task-row').forEach(row => {
          row.addEventListener('click', function(e) {
            if (e.target.closest('.checkbox-custom')) return;
            const cb = this.querySelector('.checkbox-custom');
            if (cb) cb.click();
          });
        });
      }

      function buildTaskRow(task, isChecked, personColorClass) {
        const checkedClass = isChecked ? 'checked-' + personColorClass : '';
        const textClass = isChecked ? 'task-checked' : '';
        return `
          <div class="flex items-start gap-3 py-2.5 px-1 rounded-xl hover:bg-background-150 transition-colors cursor-pointer task-row" data-task-id="${task.id}" data-person="${personColorClass}">
            <div class="checkbox-custom ${checkedClass}" data-checked="${isChecked}" data-task-id="${task.id}" data-person="${personColorClass}">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0 ${textClass} transition-all duration-300" data-text-for="${task.id}">
              <p class="font-semibold text-sm text-foreground-800 leading-snug">${task.text}</p>
              ${task.detail ? `<p class="text-xs text-foreground-450 mt-0.5 leading-relaxed">${task.detail}</p>` : ''}
            </div>
          </div>
        `;
      }

      // ── Confetti ───────────────────────────────────────
      function launchConfetti() {
        const colors = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];
        const shapes = ['circle','square','triangle'];
        for (let i = 0; i < 80; i++) {
          const el = document.createElement('div');
          el.classList.add('confetti-piece');
          const color = colors[Math.floor(Math.random() * colors.length)];
          const shape = shapes[Math.floor(Math.random() * shapes.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.background = color;
          el.style.animationDelay = (Math.random() * 1.5) + 's';
          el.style.animationDuration = (2 + Math.random() * 2) + 's';
          if (shape === 'circle') {
            el.style.borderRadius = '50%';
          } else if (shape === 'triangle') {
            el.style.width = '0';
            el.style.height = '0';
            el.style.background = 'transparent';
            el.style.borderLeft = '6px solid transparent';
            el.style.borderRight = '6px solid transparent';
            el.style.borderBottom = '12px solid ' + color;
          }
          el.style.width = (6 + Math.random() * 8) + 'px';
          el.style.height = (6 + Math.random() * 8) + 'px';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 5000);
        }
      }

      // ── Init ───────────────────────────────────────────
      todayIndex = getTodayIndex();

      // Set header date
      const now = new Date();
      document.getElementById('header-date').textContent = now.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      // Lucide init
      if (typeof lucide !== "undefined" && typeof lucide.createIcons === "function") {
        lucide.createIcons();
      }

      // Render today
      renderDay(todayIndex);

      // Tab click handlers
      document.querySelectorAll('.day-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          renderDay(parseInt(this.dataset.day));
        });
      });

      // Reset button
      document.getElementById('reset-day-btn').addEventListener('click', function() {
        if (confirm('Reset all tasks for ' + FULL_DAYS[currentDay] + '?')) {
          resetDay(currentDay);
        }
      });

    })();
    </script>
</body>
</html>
